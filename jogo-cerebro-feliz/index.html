<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Cérebro Feliz: um desafio de toque e pontuação da Reability."
    />
    <meta name="theme-color" content="#061B31" />
    <title>Cérebro Feliz | Reability</title>
    <link rel="icon" href="../assets/brand/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/brand/favicon-32.png" />
    <link rel="apple-touch-icon" href="../assets/brand/apple-touch-icon.png" />
    <link rel="manifest" href="../site.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="game-card" aria-labelledby="game-title">
        <div class="game-navigation">
          <a class="back-link" href="../index.html">← Voltar aos jogos</a>
          <div class="brand-lock" aria-label="Reability">
            <img class="brand-mark" src="../assets/brand/logo-mark.png" alt="Símbolo Reability" />
            <p class="brand-name">Reability<small>Jogos da clínica</small></p>
          </div>
        </div>

        <section id="start-screen" class="start-screen" aria-labelledby="game-title">
          <p class="eyebrow">Desafio de 45 segundos</p>
          <h1 id="game-title">Cérebro Feliz</h1>
          <p class="intro">
            Quando o cérebro aparecer, toque nele antes que mude de lugar. Cada toque vale um ponto.
          </p>
          <p class="level-instruction">Escolha o ritmo do desafio:</p>
          <div class="difficulty-options">
            <button class="difficulty-option" type="button" data-level="Fácil" data-delay="2000">
              <span>Fácil</span>
              <strong>2 segundos</strong>
              <small>Um ritmo tranquilo para começar.</small>
            </button>
            <button class="difficulty-option" type="button" data-level="Médio" data-delay="1500">
              <span>Médio</span>
              <strong>1,5 segundo</strong>
              <small>Um pouco mais de agilidade.</small>
            </button>
            <button class="difficulty-option" type="button" data-level="Difícil" data-delay="1000">
              <span>Difícil</span>
              <strong>1 segundo</strong>
              <small>Para quem quer um ritmo acelerado.</small>
            </button>
          </div>
        </section>

        <section id="game-interface" class="game-interface" hidden aria-labelledby="game-title">
          <div class="game-status" aria-live="polite" aria-atomic="true">
            <p>Pontos <strong id="score">0</strong></p>
            <p>Tempo <strong id="time-left">45</strong>s</p>
          </div>
          <p id="selected-level" class="selected-level"></p>
          <p id="game-message" class="game-message" aria-live="polite">Toque no cérebro quando ele aparecer.</p>
          <div id="brain-board" class="brain-board" role="group" aria-label="Área do desafio Cérebro Feliz"></div>
          <button id="stop-button" class="button button-secondary" type="button">Encerrar desafio</button>
        </section>
      </section>
    </main>

    <dialog id="result-dialog" class="result-dialog" aria-labelledby="result-title">
      <div class="result-dialog__content">
        <p class="eyebrow">Desafio concluído</p>
        <h2 id="result-title">Cérebro Feliz</h2>
        <p id="result-summary"></p>
        <div class="result-dialog__actions">
          <button id="play-again-button" class="button button-primary" type="button">Jogar de novo</button>
          <button id="choose-level-button" class="button button-secondary" type="button">Trocar nível</button>
        </div>
      </div>
    </dialog>

    <script src="./script.js" defer></script>
    <script src="../disclaimer.js" defer></script>
  </body>
</html>
